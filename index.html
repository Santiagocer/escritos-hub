<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poemas Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__content">
      <p class="eyebrow">Hub de poemas, reflexiones y más</p>
      <div class="hero-heading">
        <span class="hero-badge">✨ Poemas</span>
        <h1>Poemas Hub</h1>
      </div>
      <p>Un espacio inmersivo donde cada verso se siente, cada reflexión se descubre y cada historia brilla desde una base de datos viva.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="search-group">
        <label for="search">Buscar:</label>
        <div class="input-icon">
          <span class="icon">🔎</span>
          <input id="search" type="search" placeholder="Buscar título, autor, categoría o palabra clave" />
        </div>
      </div>
      <div class="search-group">
        <label for="category">Categoría:</label>
        <div class="input-icon">
          <span class="icon">🏷️</span>
          <select id="category">
            <option value="todos">Todas</option>
          </select>
        </div>
      </div>
      <div class="filters">
        <button class="filter-button active" data-type="todos">Todos</button>
        <button class="filter-button" data-type="poema">Poemas</button>
        <button class="filter-button" data-type="reflexion">Reflexiones</button>
        <button class="filter-button" data-type="verso">Versos</button>
      </div>
      <button id="themeToggle" class="theme-button" aria-label="Modo extra oscuro">🌙 Modo oscuro</button>
            <button id="clearFilters" class="clear-button">Limpiar filtros</button>
    </section>

    <section class="result-summary">
      <p id="resultCount" class="result-count">Mostrando entradas...</p>
    </section>

    <section id="cards" class="cards" aria-live="polite">
      <p class="loading">Cargando poemas...</p>
    </section>
  </main>

  <footer class="footer">
    <p>Creado como un hub simple de poemas y reflexiones.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
